name: Publish to NPM (next)

# Publishes prerelease builds to npm on every main push.
# Stable releases are published via release.yml → _npm-publish.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-next:
    uses: ./.github/workflows/_npm-publish.yml
    permissions:
      contents: read
      id-token: write
    with:
      channel: next
      ref: ${{ github.sha }}
